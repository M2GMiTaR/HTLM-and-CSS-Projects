<!DOCTYPE html>
<html lang="en">
<head>
    <title>Raw Cat Food - Slideshow Gallery</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/one_page_website.css">
</head>
<body>
    <!-- NAV -->
    <div>
        <div>
            <ul>
                <a href="#home" id="link"><li>HOME</li></a>
                <a href="#gallery"><li>GALLERY</li></a>
                <a href="#contact"><li>RESERVATIONS</li></a>
            </ul>
        </div>
    </div>
    <!-- END NAV -->
    
    <!-- HOME -->
    <div id="home">
        <div>
            <div>
                <span>Better Raw Cat Food</span>
            </div>
        </div>
    </div>
    <!-- END HOME -->
    
    <!-- GALLERY - SLIDESHOW FORMAT -->
    <section>
        <div id="gallery">
            <h1>Gallery</h1>
            
            <!-- Main Slideshow Container -->
            <div class="slideshow-container">
                <!-- Main Display Area -->
                <div class="main-display">
                    <!-- Video Slide (special) -->
                    <div class="main-slide active" data-type="video" data-src="https://www.youtube.com/embed/x7We-ReAyo4">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/x7We-ReAyo4" 
                        title="How to Raw Feed your Cat (Complete Nutrition Guide) | The Cat Butler" 
                        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>
                    
                    <!-- Image Slides -->
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_1.jpg">
                        <img src="./images/thumb/thumbnail_1.jpg" alt="Image of raw food diet.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_2.jpg">
                        <img src="./images/thumb/thumbnail_2.jpg" alt="Image of a cat with a bowl of raw food.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_3.jpg">
                        <img src="./images/thumb/thumbnail_3.jpg" alt="Image of preped containers with raw food">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_4.jpg">
                        <img src="./images/thumb/thumbnail_4.jpg" alt="Image of giving a cat different types of raw meat.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_5.jpg">
                        <img src="./images/thumb/thumbnail_5.jpg" alt="Image of two bowls - Kibble to Raw change.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_6.jpg">
                        <img src="./images/thumb/thumbnail_6.jpg" alt="Image of balancing a raw diet diagram.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_7.jpg">
                        <img src="./images/thumb/thumbnail_7.jpg" alt="Image of showing benefits of raw for cats.">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_8.jpg">
                        <img src="./images/thumb/thumbnail_8.jpg" alt="What should you feed your cat?">
                    </div>
                    
                    <div class="main-slide" data-type="image" data-src="./images/thumb/thumbnail_9.jpg">
                        <img src="./images/thumb/thumbnail_9.jpg" alt="Image of a black cat licking it's lips.">
                    </div>
                    
                    <!-- Navigation Arrows -->
                    <a class="slide-prev">&#10094;</a>
                    <a class="slide-next">&#10095;</a>
                    
                    <!-- Slide Counter -->
                    <div class="slide-counter">
                        <span class="current-slide">1</span> / <span class="total-slides">10</span>
                    </div>
                </div>
                
                <!-- Thumbnail Strip (like the reference image) -->
                <div class="thumbnail-strip">
                    <div class="thumbnail active" data-index="0">
                        <img src="https://img.youtube.com/vi/x7We-ReAyo4/0.jpg" alt="Video thumbnail">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="thumbnail" data-index="1">
                        <img src="./images/thumb/thumbnail_1.jpg" alt="Thumb 1">
                    </div>
                    <div class="thumbnail" data-index="2">
                        <img src="./images/thumb/thumbnail_2.jpg" alt="Thumb 2">
                    </div>
                    <div class="thumbnail" data-index="3">
                        <img src="./images/thumb/thumbnail_3.jpg" alt="Thumb 3">
                    </div>
                    <div class="thumbnail" data-index="4">
                        <img src="./images/thumb/thumbnail_4.jpg" alt="Thumb 4">
                    </div>
                    <div class="thumbnail" data-index="5">
                        <img src="./images/thumb/thumbnail_5.jpg" alt="Thumb 5">
                    </div>
                    <div class="thumbnail" data-index="6">
                        <img src="./images/thumb/thumbnail_6.jpg" alt="Thumb 6">
                    </div>
                    <div class="thumbnail" data-index="7">
                        <img src="./images/thumb/thumbnail_7.jpg" alt="Thumb 7">
                    </div>
                    <div class="thumbnail" data-index="8">
                        <img src="./images/thumb/thumbnail_8.jpg" alt="Thumb 8">
                    </div>
                    <div class="thumbnail" data-index="9">
                        <img src="./images/thumb/thumbnail_9.jpg" alt="Thumb 9">
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- END GALLERY -->
    
    <!-- LIGHTBOX MODAL (for fullscreen viewing) -->
    <div id="lightbox-modal" class="lightbox-modal">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content">
            <img class="lightbox-image" src="" alt="Enlarged view">
            <div class="lightbox-video-container" style="display: none;">
                <iframe class="lightbox-video" width="960" height="540" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>
        <a class="lightbox-prev">&#10094;</a>
        <a class="lightbox-next">&#10095;</a>
    </div>
    
    <!-- RSVP like reservation form -->
    <section>
        <div id="contact">
            <div>
                <h1>Reservations</h1>
                <div>
                    <h2><span>Feed your cats the very best!</span>
                    <br />Book the free consultation now!
                    </h2>
                    <p>
                        Please provide us with your basic contact information.
                    </p>
                    <div>
                        <form action="" method="post">
                            <input class="rsvp" type="text" value="First Name">
                            <input class="rsvp" type="text" value="Last Name">
                            <input class="rsvp" type="text" value="Email Address">
                            <input class="rsvp" type="text" value="Phone Number">
                            <div class="form-spacer">
                                <label class="terms">Terms and Conditions</label>
                            </div>
                            <div>
                                <input type="submit" value="Submit">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- END RSVP -->
    
    <!-- FOOTER -->
    <div class="footer">
        www.RawCatFood.com &nbsp;|&nbsp; &copy; 2025
    </div>
    <!-- END FOOTER -->
    
    <script src="JS/one_page_website.js"></script>
</body>
</html>
